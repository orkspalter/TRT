<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Rezept-Zauberer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6b3fa0">

  <link rel="stylesheet" href="style.css">
  <style>
    .generator-box { margin-bottom: 30px; }
    
    .generator-label {
      font-size: 1.1rem;
      font-weight: 700;
      color: #4e2a7a;
      margin-bottom: 10px;
      display: block;
    }

    body.dark-mode .generator-label { color: #e4ccff; }

    .generator-input {
      width: 100%;
      height: 160px; 
      padding: 16px;
      border: 2px solid #e6e6e6;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      margin-bottom: 16px;
      resize: none; 
      box-sizing: border-box;
      background-color: #fafafa;
      color: #333;
      transition: all 0.3s ease;
      overflow-y: auto; 
    }

    body.dark-mode .generator-input {
      background-color: #2a2a2a;
      border-color: #444;
      color: #f0f0f0;
    }

    .generator-input:focus {
      outline: none;
      border-color: #6b3fa0;
      box-shadow: 0 0 0 3px rgba(107, 63, 160, 0.1);
    }

    .btn-magic {
      width: 100%;
      padding: 14px;
      background-color: #6b3fa0;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(107, 63, 160, 0.2);
    }

    .btn-magic:hover {
      background-color: #4e2a7a;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(107, 63, 160, 0.3);
    }

    /* === Sternenschauer Animation CSS === */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
      animation: fadeIn 0.4s ease-out;
    }

    .star-shower-container {
      width: 200px;
      height: 120px;
      background-color: #f3ecfb; 
      border-radius: 16px;
      position: relative;
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid rgba(107, 63, 160, 0.1);
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.02);
    }
    
    body.dark-mode .star-shower-container {
      background-color: #2d1b4a; 
      border-color: rgba(228, 204, 255, 0.1);
    }

    .falling-star {
      position: absolute;
      color: #4e2a7a; 
      opacity: 0;
      animation: fall linear infinite;
    }

    body.dark-mode .falling-star { color: #e4ccff; }

    .star-1 { width: 24px; height: 24px; top: -20px; left: 10px; animation-duration: 1.5s; animation-delay: 0s; }
    .star-2 { width: 14px; height: 14px; top: 10px; left: -15px; animation-duration: 1.8s; animation-delay: 0.3s; }
    .star-3 { width: 32px; height: 32px; top: -30px; left: 50px; animation-duration: 2.1s; animation-delay: 0.7s; }
    .star-4 { width: 20px; height: 20px; top: 40px; left: -20px; animation-duration: 1.6s; animation-delay: 1.1s; }
    .star-5 { width: 16px; height: 16px; top: -10px; left: 90px; animation-duration: 1.4s; animation-delay: 0.5s; }
    .star-6 { width: 26px; height: 26px; top: -20px; left: 130px; animation-duration: 2.3s; animation-delay: 0.9s; }

    @keyframes fall {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      80% { opacity: 1; }
      100% { transform: translate(250px, 150px) rotate(180deg); opacity: 0; }
    }

    .loading-text {
      text-align: center;
      color: #666;
      font-weight: 600;
      animation: pulse 1.5s infinite;
    }

    body.dark-mode .loading-text { color: #a0a0a0; }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="app">
    
    <button class="theme-toggle" onclick="toggleTheme()" title="Nachtmodus umschalten">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>

    <header>
      <h1>Rezept-Zauberer</h1>
      <p>
        <a href="index.html" class="archive-link">
          <svg style="transform: translateY(-2px);" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 11l9-8 9 8"></path>
            <path d="M5 13v8a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-8"></path>
          </svg>
          Zurück zur Startseite
        </a>
      </p>
    </header>

    <main class="card">
      <div class="generator-box">
        <label for="aiInput" class="generator-label">Was hast du noch im Kühlschrank?</label>
        <textarea id="aiInput" class="generator-input" placeholder="z.B.: Ich habe noch eine halbe Zucchini, Feta, Nudeln und etwas Knoblauch. Mach mir ein schnelles Hauptgericht daraus!"></textarea>
        
        <button class="btn-magic" onclick="simulateGeneration()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
          Rezept zaubern
        </button>
      </div>

      <div id="generatorResult"></div>
    </main>

  </div>

  <script src="app.js"></script>
  <script>
    // === UPDATED: Disketten-SVG statt Herz ===
    const saveSvg = `<svg width="20" height="20" viewBox="0 0 24 24"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>`;
    const shareIcon = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="var(--primary)" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`;
    const svgCart = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>`;
    const svgStir = `<svg style="transform: translateY(-2px);" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11h16v6a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-6z"></path><line x1="2" y1="13" x2="4" y2="13"></line><line x1="20" y1="13" x2="22" y2="13"></line><line x1="20" y1="3" x2="14" y2="13"></line><circle cx="13" cy="15" r="2.5"></circle><path d="M9 14a3 3 0 0 1 3 0"></path></svg>`;

    async function simulateGeneration() {
      const inputVal = document.getElementById("aiInput").value;
      if (!inputVal.trim()) {
        alert("Bitte verrate mir erst, was du verarbeiten möchtest!");
        return;
      }

      const resultDiv = document.getElementById("generatorResult");
      
      const starSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>`;
      
      // === UPDATED: Skeleton ohne Tag-Platzhalter ===
      resultDiv.innerHTML = `
        <div class="loading-container">
          <div class="star-shower-container">
            <div class="falling-star star-1">${starSvg}</div>
            <div class="falling-star star-2">${starSvg}</div>
            <div class="falling-star star-3">${starSvg}</div>
            <div class="falling-star star-4">${starSvg}</div>
            <div class="falling-star star-5">${starSvg}</div>
            <div class="falling-star star-6">${starSvg}</div>
          </div>
          <div class="loading-text">Timm's KI-Koch zaubert die Zutaten zusammen...</div>
        </div>
      `;

      try {
        const response = await fetch('/.netlify/functions/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ inputVal: inputVal })
        });

        if (!response.ok) {
            const errorDetails = await response.json();
            throw new Error(errorDetails.error || "Unbekannter Serverfehler");
        }

        const recipe = await response.json();

        // === UPDATED: Keine Tag-Verarbeitung mehr ===
        const ingHtml = recipe.ingredients.map(i => `<li>${i}</li>`).join("");
        const stepHtml = recipe.steps.map(s => `<li>${s}</li>`).join("");

        // === UPDATED: Disketten-Button & keine Tags im HTML ===
        resultDiv.innerHTML = `
          <div class="recipe-card" style="animation: fadeIn 0.4s ease-out;">
            <div class="recipe-body">
              <div class="title-row">
                <h2 class="recipe-title">${recipe.title}</h2>
                <button class="fav-btn" title="Rezept speichern" onclick="this.classList.toggle('active')">${saveSvg}</button>
              </div>
              <div class="divider"></div>
              <div class="recipe-content">
                <div class="ingredients-col">
                  <div class="section-header">
                    <h3 class="section-title">${svgCart} Zutaten</h3>
                    <button class="share-btn" title="Rezept teilen">${shareIcon}</button>
                  </div>
                  <ul>${ingHtml}</ul>
                </div>
                <div class="steps-col">
                  <h3 class="section-title" style="margin-top: 20px;">${svgStir} Zubereitung</h3>
                  <ol class="steps">${stepHtml}</ol>
                </div>
              </div>
            </div>
          </div>
        `;

      } catch (error) {
        console.error("Fehler:", error);
        resultDiv.innerHTML = `<div class="loading-text" style="color: red; padding: 10px; border: 1px solid red; border-radius: 8px;"><b>Fehler:</b> ${error.message}</div>`;
      }
    }
  </script>
</body>
</html>
