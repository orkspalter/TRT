<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Timm's Tipps des Tages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      /* Das Hellviolett aus dem Hintergrund deines Logos */
      background-color: #e4ccff; 
      font-family: 'Nunito', system-ui, sans-serif;
      overflow: hidden; /* Verhindert Scrollbalken durch herumkrabbelnde Logos */
    }

    /* Container für den Zurück-Button */
    .back-btn-container {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100; /* Sehr wichtig: Muss ÜBER den Logos liegen, damit er klickbar bleibt! */
    }
    
    /* Ein bisschen Styling für den Button, damit er gut aussieht */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #6b3fa0;
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 12px 20px;
      border-radius: 999px;
      box-shadow: 0 4px 12px rgba(107, 63, 160, 0.3);
      transition: transform 0.2s, background-color 0.2s;
    }

    .back-btn:hover {
      background-color: #4e2a7a;
      transform: translateY(-2px);
    }

    /* Die Eigenschaften für unsere Logo-Ameisen */
    .ant-logo {
      position: absolute;
      top: 0;
      left: 0;
      width: 40px; /* Größe der Logos */
      height: 40px;
      z-index: 10; /* Liegen UNTER dem Zurück-Button */
      pointer-events: none; /* Man kann nicht versehentlich draufklicken */
      will-change: transform; /* Hardware-Beschleunigung für flüssigere Animation */
      margin-top: -20px; /* Verschiebt den Mittelpunkt für korrekte Rotation */
      margin-left: -20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="back-btn-container">
    <a href="index.html" class="back-btn">⬅️ Zurück</a>
  </div>

      });
