<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Timm's Tipps des Tages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6b3fa0">

  <style>
    /* LOKALE SCHRIFTARTEN */
    @font-face {
      font-family: 'Nunito'; font-style: normal; font-weight: 400; font-display: swap;
      src: url('./fonts/nunito-regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Nunito'; font-style: normal; font-weight: 600; font-display: swap;
      src: url('./fonts/nunito-600.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Nunito'; font-style: normal; font-weight: 700; font-display: swap;
      src: url('./fonts/nunito-700.woff2') format('woff2');
    }
    @font-face {
      font-family: 'Playfair Display'; font-style: normal; font-weight: 700; font-display: swap;
      src: url('./fonts/playfair-700.woff2') format('woff2');
    }

    :root {
      --primary: #6b3fa0;
      --primary-dark: #4e2a7a;
      --card-bg: #fff;
      --text: #222;
      --muted: #666;
      --radius: 16px;
      --border: #e6e6e6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: radial-gradient(circle at top, #f3ecfb, #f6f6f6);
      color: var(--text);
      min-height: 100vh;
      padding: 16px;
      line-height: 1.6;
    }

    /* --- FARBIGE SCROLLBAR --- */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; border: 2px solid #f1f1f1; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-dark); }
    * { scrollbar-width: thin; scrollbar-color: var(--primary) #f1f1f1; }

    .app { max-width: 800px; margin: 0 auto; }
    
    header { text-align: center; margin-bottom: 24px; }
    h1 { font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 2.2rem; margin-bottom: 8px;}
    
    .nav-links { display: flex; justify-content: center; gap: 15px; }
    .nav-links a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .nav-links a:hover { text-decoration: underline; }

    .recipe-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      padding: 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    .title-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; margin-bottom: 12px; }
    .recipe-title { font-family: 'Playfair Display', serif; color: var(--primary-dark); font-size: 1.5rem; margin: 0; line-height: 1.3; }

    /* --- DAS LEUCHTENDE HERZ --- */
    .fav-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: transform 0.2s;
    }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn svg { fill: #ccc; transition: fill 0.3s, filter 0.3s; }
    .fav-btn:hover svg { fill: var(--primary); filter: drop-shadow(0 0 6px #e4ccff); }
    .fav-btn.active svg { fill: var(--primary-dark); filter: none; }

    .tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .tag { background: #f3ecfb; color: var(--primary-dark); padding: 4px 12px; border-radius: 999px; font-size: 0.85rem; font-weight: 700; }

    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    .recipe-content { display: grid; gap: 20px; }
    @media (min-width: 600px) { .recipe-content { grid-template-columns: 1fr 1fr; } }

    .section-title { font-size: 1.1rem; color: var(--primary-dark); margin-bottom: 10px; font-weight: 700; }
    ul, ol { padding-left: 20px; }
    li { margin-bottom: 6px; }

    .btn-swap {
      width: 100%;
      background: #fff;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: var(--radius);
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.2s;
    }
    .btn-swap:hover { border-color: var(--primary); color: var(--primary-dark); background: #fcfcfc; }

    /* --- SKELETON LOADER ANIMATION --- */
    @keyframes skeleton-loading { 0% { background-color: #efefef; } 100% { background-color: #fcfcfc; } }
    .skeleton { animation: skeleton-loading 0.8s linear infinite alternate; border-radius: 8px; }

  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Timm's Tipps des Tages</h1>
      <div class="nav-links">
        <a href="archive.html">📚 Archiv & Favoriten</a>
      </div>
    </header>

    <main id="currentRecipes">
      </main>

    <footer style="text-align: center; margin-top: 40px; font-size: 0.9rem;">
      <a href="impressum.html" style="color: var(--muted); text-decoration: none;">Impressum</a> | 
      <a href="datenschutz.html" style="color: var(--muted); text-decoration: none;">Datenschutz</a>
    </footer>
  </div>

  <script src="rezepte.js"></script>

  <script>
    const STORAGE_SELECTED_WEEK = "tipps_selected_week";
    const STORAGE_FAVORITES = "tipps_favorites";
    const IGNORE_TAGS = ["Optional Fleisch", "Optional vegetarisch"];

    // Hilfsfunktionen
    function loadJSON(key, fallback) {
      try {
        const val = localStorage.getItem(key);
        return val ? JSON.parse(val) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function saveJSON(key, data) {
      localStorage.setItem(key, JSON.stringify(data));
    }

    // Aktuelle Kalenderwoche berechnen
    function getIsoWeek() {
      const d = new Date();
      d.setHours(0,0,0,0);
      d.setDate(d.getDate() + 4 - (d.getDay() || 7));
      const yearStart = new Date(d.getFullYear(), 0, 1);
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getFullYear()}-W${weekNo}`;
    }

    // Favoriten laden und speichern
    function getFavorites() {
      return loadJSON(STORAGE_FAVORITES, []);
    }

    window.toggleFavorite = function(id, btn) {
      let favs = getFavorites();
      if (favs.includes(id)) {
        favs = favs.filter(f => f !== id);
        btn.classList.remove('active');
      } else {
        favs.push(id);
        btn.classList.add('active');
      }
      saveJSON(STORAGE_FAVORITES, favs);
    };

    function renderTag(tag) {
      return `<span class="tag">${tag}</span>`;
    }

    // Rezepte der Woche laden oder neu würfeln
    function loadWeekSelection(weekKey) {
      const stored = loadJSON(STORAGE_SELECTED_WEEK, null);
      if (stored && stored.weekKey === weekKey && stored.selection && stored.selection.length === 3) {
        return stored.selection;
      }
      let shuffled = [...recipes].sort(() => 0.5 - Math.random());
      let selection = shuffled.slice(0, 3).map(r => r.id);
      saveJSON(STORAGE_SELECTED_WEEK, { weekKey, selection });
      return selection;
    }

    function saveWeekSelection(weekKey, selection) {
      saveJSON(STORAGE_SELECTED_WEEK, { weekKey, selection });
    }

    // Einzelnes Rezept mit Skeleton-Loader austauschen
    window.swapSingleRecipe = function(indexToReplace) {
      const container = document.getElementById("currentRecipes");
      const oldCard = container.children[indexToReplace];
      
      // Platzhalter (Skeleton) generieren
      const skeletonCard = document.createElement("div");
      skeletonCard.className = "recipe-card";
      skeletonCard.style.animationDelay = "0s";
      skeletonCard.innerHTML = `
        <div class="recipe-body">
          <div class="skeleton" style="height: 30px; width: 80%; margin-bottom: 20px;"></div>
          <div class="tag-row">
            <div class="skeleton" style="height: 20px; width: 60px; border-radius: 999px;"></div>
            <div class="skeleton" style="height: 20px; width: 80px; border-radius: 999px;"></div>
          </div>
          <div class="divider"></div>
          <div class="skeleton" style="height: 100px; width: 100%;"></div>
          <div class="skeleton" style="margin-top: 20px; height: 150px; width: 100%;"></div>
        </div>
        <div class="skeleton" style="margin-top: 16px; height: 45px; width: 100%;"></div>
      `;
      
      container.replaceChild(skeletonCard, oldCard);

      // Timeout für geschmeidigen Übergang
      setTimeout(() => {
        const stored = loadJSON(STORAGE_SELECTED_WEEK, null);
        if (!stored) return;
        
        let currentSelection = loadWeekSelection(stored.weekKey);
        if (!currentSelection) return;
        
        let newRecipe;
        do {
          const randomIdx = Math.floor(Math.random() * recipes.length);
          newRecipe = recipes[randomIdx];
        } while (currentSelection.includes(newRecipe.id));

        currentSelection[indexToReplace] = newRecipe.id;
        saveWeekSelection(stored.weekKey, currentSelection);
        
        const r = newRecipe;
        const favs = getFavorites();
        const isFav = favs.includes(r.id);
        const visibleTags = r.tags.filter(t => !IGNORE_TAGS.includes(t));

        const heartSvg = `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

        const finalCard = document.createElement("div");
        finalCard.className = "recipe-card";
        finalCard.style.animation = "fadeIn 0.4s ease-out";

        finalCard.innerHTML = `
          <div class="recipe-body">
            <div class="title-row">
              <h2 class="recipe-title">${r.title}</h2>
              <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.id}', this)" title="Als Favorit markieren">
                ${heartSvg}
              </button>
            </div>
            <div class="tag-row">
              ${visibleTags.map(t => renderTag(t)).join("")}
            </div>
            <div class="divider"></div>
            <div class="recipe-content">
              <div class="ingredients-col">
                <h3 class="section-title">🛒 Zutaten</h3>
                <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
              </div>
              <div class="steps-col">
                <h3 class="section-title">👨‍🍳 Zubereitung</h3>
                <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
              </div>
            </div>
          </div>
          <button class="btn-swap" onclick="swapSingleRecipe(${indexToReplace})">🔄 Nur dieses Rezept austauschen</button>
        `;
        
        container.replaceChild(finalCard, skeletonCard);
      }, 300);
    };

    // Initiale Wochen-Anzeige generieren
    function showWeek() {
      // WICHTIG: Falls recipes nicht existiert (falscher Pfad), direkt abbrechen, um Crash zu vermeiden
      if (typeof recipes === 'undefined') {
        document.getElementById("currentRecipes").innerHTML = `<p style="text-align:center; color:red;">Fehler: rezepte.js konnte nicht geladen werden. Bitte Pfad prüfen!</p>`;
        return;
      }

      const weekKey = getIsoWeek();
      const selection = loadWeekSelection(weekKey);
      const container = document.getElementById("currentRecipes");
      container.innerHTML = "";

      const favs = getFavorites();

      selection.forEach((id, index) => {
        const r = recipes.find(x => x.id === id);
        if (!r) return;

        const isFav = favs.includes(r.id);
        const visibleTags = r.tags.filter(t => !IGNORE_TAGS.includes(t));
        const heartSvg = `<svg width="24" height="24" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;

        const card = document.createElement("div");
        card.className = "recipe-card";
        card.innerHTML = `
          <div class="recipe-body">
            <div class="title-row">
              <h2 class="recipe-title">${r.title}</h2>
              <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.id}', this)" title="Als Favorit markieren">
                ${heartSvg}
              </button>
            </div>
            <div class="tag-row">
              ${visibleTags.map(t => renderTag(t)).join("")}
            </div>
            <div class="divider"></div>
            <div class="recipe-content">
              <div class="ingredients-col">
                <h3 class="section-title">🛒 Zutaten</h3>
                <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
              </div>
              <div class="steps-col">
                <h3 class="section-title">👨‍🍳 Zubereitung</h3>
                <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
              </div>
            </div>
          </div>
          <button class="btn-swap" onclick="swapSingleRecipe(${index})">🔄 Nur dieses Rezept austauschen</button>
        `;
        container.appendChild(card);
      });
    }

    // App direkt starten
    showWeek();
  </script>
</body>
</html>
