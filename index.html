<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Timm's Tipps des Tages</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6b3fa0">

  <link rel="manifest" href="manifest.json?v=2">
  <link rel="apple-touch-icon" href="icon-192.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Timm's Tipps des Tages</h1>
      <p><a href="archive.html">📚 Zur Rezeptdatenbank</a></p>
    </header>

    <main class="card">
      <div id="currentRecipes"></div>
    </main>
    
   <footer style="text-align: center; margin-top: 40px; padding-bottom: 20px; font-size: 0.9rem; display: flex; flex-direction: column; align-items: center; gap: 16px;">
      <div>
        <a href="impressum.html" style="color: var(--muted); text-decoration: none; margin: 0 10px;">Impressum</a>
        <a href="datenschutz.html" style="color: var(--muted); text-decoration: none; margin: 0 10px;">Datenschutz</a>
      </div>
      
      <button class="theme-toggle" onclick="toggleTheme()" title="Nachtmodus umschalten">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </footer>

  </div>

  <script src="rezepte.js"></script>
  <script src="app.js"></script>

  <script>
    const STORAGE_SELECTED_WEEK = "timm-selected-week-v1";
    const STORAGE_WEEK_RECIPES = "timm-week-recipes-v1";
  
    function getWeekNumber(d) {
      d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
      return Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
    }

    function getCurrentWeekKey() {
      const now = new Date();
      return `${now.getFullYear()}-${getWeekNumber(now)}`;
    }

    function loadJSON(key, fallback) {
      const raw = localStorage.getItem(key);
      if (!raw) return fallback;
      try { return JSON.parse(raw); } catch { return fallback; }
    }
    
    function saveJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function pickRandomThreeRecipes() {
      const shuffled = [...recipes].sort(() => 0.5 - Math.random());
      return [shuffled[0].id, shuffled[1].id, shuffled[2].id];
    }

    function loadWeekSelection(weekKey) {
      const archive = loadJSON(STORAGE_WEEK_RECIPES, {});
      return archive[weekKey] || null;
    }

    function saveWeekSelection(weekKey, recipeIds) {
      const archive = loadJSON(STORAGE_WEEK_RECIPES, {});
      archive[weekKey] = recipeIds;
      saveJSON(STORAGE_WEEK_RECIPES, archive);
    }

    function renderRecipeCards(recipeIds, containerElement) {
      containerElement.innerHTML = "";
      
      recipeIds.forEach((id, index) => {
        const r = recipes.find(x => x.id === id);
        if (!r) return;

        const favs = getFavorites();
        const isFav = favs.includes(r.id);
        
        const heartSvg = `<svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        const shareIcon = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="var(--primary)" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`;
        
        const card = document.createElement("div");
        card.className = "recipe-card";
        card.style.animationDelay = `${index * 0.1}s`; 

        const visibleTags = r.tags.filter(t => !IGNORE_TAGS.includes(t));

        card.innerHTML = `
          <div class="recipe-body">
            <div class="title-row">
              <h2 class="recipe-title">${r.title}</h2>
              <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.id}', this)" title="Als Favorit markieren">
                ${heartSvg}
              </button>
            </div>

            <div class="tag-row">
              ${visibleTags.map(t => renderTag(t)).join("")}
            </div>
            <div class="divider"></div>
            
            <div class="recipe-content">
              <div class="ingredients-col">
                <div class="section-header">
                  <h3 class="section-title">🛒 Zutaten</h3>
                  <button class="share-btn" onclick="shareRecipe('${r.id}', this)" title="Rezept teilen">
                    ${shareIcon}
                  </button>
                </div>
                <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
              </div>
              <div class="steps-col">
                <h3 class="section-title" style="margin-top: 20px;">👨‍🍳 Zubereitung</h3>
                <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
              </div>
            </div>
          </div>
          <button class="btn-swap" onclick="swapSingleRecipe(${index})">🔄 Nur dieses Rezept austauschen</button>
        `;
        containerElement.appendChild(card);
      });
    }

    window.swapSingleRecipe = function(indexToReplace) {
      const container = document.getElementById("currentRecipes");
      const oldCard = container.children[indexToReplace];
      
      const skeletonCard = document.createElement("div");
      skeletonCard.className = "recipe-card";
      skeletonCard.style.animationDelay = "0s";
      skeletonCard.innerHTML = `
        <div class="recipe-body">
          <div class="skeleton" style="height: 30px; width: 80%; margin-bottom: 20px;"></div>
          <div class="tag-row">
            <div class="skeleton" style="height: 20px; width: 60px; border-radius: 999px;"></div>
            <div class="skeleton" style="height: 20px; width: 80px; border-radius: 999px;"></div>
          </div>
          <div class="divider"></div>
          <div class="skeleton" style="height: 100px; width: 100%;"></div>
          <div class="skeleton" style="margin-top: 20px; height: 150px; width: 100%;"></div>
        </div>
        <div class="skeleton" style="height: 50px; width: 100%;"></div>
      `;
      container.replaceChild(skeletonCard, oldCard);

      setTimeout(() => {
        const stored = loadJSON(STORAGE_SELECTED_WEEK, null);
        if (!stored) return;
        
        let currentSelection = loadWeekSelection(stored.weekKey);
        if (!currentSelection) return;
        
        let newRecipe;
        do {
          const randomIdx = Math.floor(Math.random() * recipes.length);
          newRecipe = recipes[randomIdx];
        } while (currentSelection.includes(newRecipe.id));

        currentSelection[indexToReplace] = newRecipe.id;
        saveWeekSelection(stored.weekKey, currentSelection);
        
        const r = newRecipe;
        const favs = getFavorites();
        const isFav = favs.includes(r.id);
        const visibleTags = r.tags.filter(t => !IGNORE_TAGS.includes(t));

        const heartSvg = `<svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        const shareIcon = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="var(--primary)" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>`;

        const finalCard = document.createElement("div");
        finalCard.className = "recipe-card";
        finalCard.style.animation = "fadeIn 0.4s ease-out";

        finalCard.innerHTML = `
          <div class="recipe-body">
            <div class="title-row">
              <h2 class="recipe-title">${r.title}</h2>
              <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.id}', this)" title="Als Favorit markieren">
                ${heartSvg}
              </button>
            </div>
            <div class="tag-row">
              ${visibleTags.map(t => renderTag(t)).join("")}
            </div>
            <div class="divider"></div>
            <div class="recipe-content">
              <div class="ingredients-col">
                <div class="section-header">
                  <h3 class="section-title">🛒 Zutaten</h3>
                  <button class="share-btn" onclick="shareRecipe('${r.id}', this)" title="Rezept teilen">
                    ${shareIcon}
                  </button>
                </div>
                <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
              </div>
              <div class="steps-col">
                <h3 class="section-title" style="margin-top: 20px;">👨‍🍳 Zubereitung</h3>
                <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
              </div>
            </div>
          </div>
          <button class="btn-swap" onclick="swapSingleRecipe(${indexToReplace})">🔄 Nur dieses Rezept austauschen</button>
        `;
        
        container.replaceChild(finalCard, skeletonCard);
      }, 300);
    };

    function showWeek(weekKey) {
      const [yearStr, weekStr] = weekKey.split("-");

      let selected = loadWeekSelection(weekKey);
      if (!selected) {
        selected = pickRandomThreeRecipes();
        saveWeekSelection(weekKey, selected);
      }

      renderRecipeCards(selected, document.getElementById("currentRecipes"));
      saveJSON(STORAGE_SELECTED_WEEK, { weekKey });
    }

    function initApp() {
      const stored = loadJSON(STORAGE_SELECTED_WEEK, null);
      const weekKey = stored?.weekKey || getCurrentWeekKey();
      showWeek(weekKey);
    }

    document.addEventListener("DOMContentLoaded", initApp);
  </script>
</body>
</html>
