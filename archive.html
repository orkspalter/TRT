<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Rezeptdatenbank - Archiv</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6b3fa0">

  <link rel="manifest" href="manifest.json?v=2">
  <link rel="apple-touch-icon" href="icon-192.png?v=2">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png?v=2">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Rezeptdatenbank</h1>
      <p><a href="index.html">🏠 Zurück zur Startseite</a></p>
    </header>

    <main class="card">
      <p class="muted">Suche nach Zutaten oder nutze die Schlagwörter, um zu filtern.</p>

      <input type="text" id="searchInput" class="search-input" placeholder="🔍">
      
      <div id="filterContainer" class="filter-container"></div>
      <div id="databaseContainer" class="recipes-grid"></div>
      <div id="paginationContainer" class="pagination-container"></div>
    </main>
    <footer style="text-align: center; margin-top: 40px; padding-bottom: 20px; font-size: 0.9rem;">
      <a href="impressum.html" style="color: var(--muted); text-decoration: none; margin: 0 10px;">Impressum</a>
      <a href="datenschutz.html" style="color: var(--muted); text-decoration: none; margin: 0 10px;">Datenschutz</a>
    </footer>
  </div>

  <script src="rezepte.js"></script>

  <script src="app.js"></script>

  <script>
    let selectedTags = [];
    let isExpanded = false;
    let currentPage = 1;
    const RECIPES_PER_PAGE = 10;
  
    // Sortierung nach Häufigkeit
    function getUniqueTags() {
      const tagCounts = {};
      recipes.forEach(r => {
        r.tags.forEach(t => {
          if (!IGNORE_TAGS.includes(t)) {
            tagCounts[t] = (tagCounts[t] || 0) + 1;
          }
        });
      });
      return Object.keys(tagCounts).sort((a, b) => {
        if (tagCounts[b] !== tagCounts[a]) return tagCounts[b] - tagCounts[a];
        return a.localeCompare(b);
      });
    }

    function renderFilters() {
      const container = document.getElementById("filterContainer");
      const uniqueTags = getUniqueTags();
      const limit = 10;
      const showMoreButton = uniqueTags.length > limit;
      const tagsToRender = isExpanded ? uniqueTags : uniqueTags.slice(0, limit);

      // 1. NEU: Der Favoriten-Button kommt immer als erstes!!
      const isFavActive = selectedTags.includes("Favoriten");
      let html = `<button class="filter-btn ${isFavActive ? 'active' : ''}" onclick="toggleFilter('Favoriten')">💜 Favoriten</button>`;

      // 2. Danach werden die normalen Tags gerendert
      html += tagsToRender.map(tag => {
        const isActive = selectedTags.includes(tag);
        const activeClass = isActive ? "active" : "";
        const emoji = getEmojiForTag(tag);
        return `<button class="filter-btn ${activeClass}" onclick="toggleFilter('${tag}')">${emoji} ${tag}</button>`;
      }).join("");

      if (showMoreButton) {
        html += `<button class="more-btn" onclick="toggleExpand(${!isExpanded})">${isExpanded ? 'weniger' : '... mehr'}</button>`;
      }
      container.innerHTML = html;
    }

    window.toggleExpand = function(state) {
      isExpanded = state;
      renderFilters();
    };

    window.toggleFilter = function(tag) {
      if (selectedTags.includes(tag)) {
        selectedTags = selectedTags.filter(t => t !== tag); 
      } else {
        selectedTags.push(tag); 
      }
      renderFilters(); 
      renderDatabase(); 
    };

    function renderDatabase() {
      const container = document.getElementById("databaseContainer");
      const searchQuery = document.getElementById("searchInput").value.toLowerCase();
      let filteredRecipes = recipes;

      if (searchQuery) {
        const favs = getFavorites();
        filteredRecipes = filteredRecipes.filter(r => {
          // Prüfen, ob nach Favoriten gesucht wird
          if (searchQuery === "❤️" || searchQuery.includes("favorit")) {
            return favs.includes(r.id);
          }
          // Ansonsten normale Textsuche
          const textToSearch = (r.title + " " + r.tags.join(" ") + " " + r.ingredients.join(" ")).toLowerCase();
          return textToSearch.includes(searchQuery);
        });
      }

      if (selectedTags.length > 0) {
        // Favoriten laden und prüfen, ob der Favoriten-Filter angeklickt wurde
        const favs = getFavorites();
        const requireFav = selectedTags.includes("Favoriten");
        
        // Alle anderen ausgewählten Tags (ohne "Favoriten")
        const normalTags = selectedTags.filter(t => t !== "Favoriten");

        filteredRecipes = filteredRecipes.filter(r => {
          // 1. Check: Wenn der Favoriten-Filter aktiv ist, MUSS das Rezept ein Herz haben
          if (requireFav && !favs.includes(r.id)) return false;
          
          // 2. Check: Das Rezept muss außerdem alle anderen ausgewählten Tags besitzen
          return normalTags.every(selectedTag => r.tags.includes(selectedTag));
        });
      }

      if (filteredRecipes.length === 0) {
        container.innerHTML = `<div class="empty">Keine Rezepte gefunden.</div>`;
        document.getElementById("paginationContainer").innerHTML = "";
        return;
      }

      const totalPages = Math.ceil(filteredRecipes.length / RECIPES_PER_PAGE);
      if (currentPage > totalPages) currentPage = totalPages || 1;

      const startIndex = (currentPage - 1) * RECIPES_PER_PAGE;
      const recipesToShow = filteredRecipes.slice(startIndex, startIndex + RECIPES_PER_PAGE);

      container.innerHTML = recipesToShow.map((r, index) => {
        const visibleTags = r.tags.filter(t => !IGNORE_TAGS.includes(t));
        
        // Neu: Favoriten-Status abrufen & Herz-Icon
        const favs = getFavorites();
        const isFav = favs.includes(r.id);
        const heartSvg = `<svg width="20" height="20" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>`;
        const floppyIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="var(--primary)"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>`;
        
        return `
          <div class="recipe-card" style="animation-delay: ${index * 0.05}s">
            <div class="recipe-body">
              <div class="title-row">
                <h2 class="recipe-title">${r.title}</h2>
                <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.id}', this)" title="Als Favorit markieren">
                  ${heartSvg}
                </button>
              </div>
              <div class="tag-row">${visibleTags.map(t => `<span class="tag ${getColorClassForTag(t)}">${getEmojiForTag(t)} ${t}</span>`).join("")}</div>
              <div class="divider"></div>
              <div class="section-header">
                <h3 class="section-title">🛒 Zutaten</h3>
                <button class="copy-btn" onclick="copyRecipe('${r.id}', this)">${floppyIcon}</button>
              </div>
              <ul>${r.ingredients.map(i => `<li>${i}</li>`).join("")}</ul>
              <h3 class="section-title" style="margin-top: 20px;">👨‍🍳 Zubereitung</h3>
              <ol class="steps">${r.steps.map(s => `<li>${s}</li>`).join("")}</ol>
            </div>
          </div>`;
      }).join("");

      renderPaginationButtons(totalPages);
    }

    function renderPaginationButtons(totalPages) {
      const paginationContainer = document.getElementById("paginationContainer");
      if (totalPages <= 1) { paginationContainer.innerHTML = ""; return; }
      let html = "";
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-num ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
      }
      paginationContainer.innerHTML = html;
    }

    window.changePage = function(newPage) {
      currentPage = newPage;
      renderDatabase();
      document.querySelector(".search-input").scrollIntoView({ behavior: 'smooth', block: 'start' });
    };

    document.getElementById("searchInput").addEventListener("input", () => {
      currentPage = 1;
      renderDatabase();
    });
    
    document.addEventListener("DOMContentLoaded", () => {
      renderFilters();
      renderDatabase();
    });
  </script>
</body>
</html>
